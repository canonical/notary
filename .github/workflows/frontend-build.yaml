name: Frontend Build

on:
  workflow_call:

jobs:
  nextjs-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6
      - name: use npm
        uses: actions/setup-node@v6

      - name: check format
        run: |
          npx prettier -c src/

      - name: Build frontend
        run: |
          npm install
          npm run build
      - name: Upload frontend files
        uses: actions/upload-artifact@v7
        with:
          name: frontend-static-files
          path: ui/out