name: Frontend Format and Lint

on:
  workflow_call:

jobs:  
  nextjs-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - name: Use npm
        uses: actions/setup-node@v4
      - name: Install dependencies
        run: |
          npm install
      - name: format frontend
        run: |
          npm run format
      - name: lint frontend
        run: |
          npm run lint