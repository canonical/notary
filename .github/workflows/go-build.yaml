name: Go Build

on:
  workflow_call:

jobs:
  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Download frontend files
        uses: actions/download-artifact@v8
        with:
          name: frontend-static-files
          path: ui/out
      - name: Build
        run: go build ./...