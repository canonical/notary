name: Snap Publish

on:
  workflow_call:
    secrets:
      SNAPCRAFT_STORE_CREDENTIALS:
        required: true

jobs:
  publish-snap:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Downloads locally built snap artifact
        uses: actions/download-artifact@v4
        id: download
        with:
          name: snap

      - name: Determine snap file name
        id: find-snap
        run: |
          SNAP_FILE=$(ls *.snap)
          echo "Found snap file: $SNAP_FILE"
          echo "snap_file=${SNAP_FILE}" >>$GITHUB_OUTPUT

      - name: Determine snap channel
        id: channel
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "channel=edge" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" =~ ^release-([0-9]+)$ ]]; then
            TRACK="${BASH_REMATCH[1]}"
            echo "channel=${TRACK}/edge" >> $GITHUB_OUTPUT
          fi

      - name: Publish snap
        uses: canonical/action-publish@v1.2.0
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.find-snap.outputs.snap_file }}
          release: ${{ steps.channel.outputs.channel }}
