basePath: /
definitions:
  server.CRL:
    properties:
      crl:
        type: string
    type: object
  server.CertificateAuthority:
    properties:
      certificate:
        type: string
      crl:
        type: string
      csr:
        type: string
      enabled:
        type: boolean
      id:
        type: integer
      private_key:
        type: string
    type: object
  server.CertificateRequest:
    properties:
      certificate_chain:
        type: string
      csr:
        type: string
      email:
        type: string
      id:
        type: integer
      status:
        type: string
    type: object
  server.ChangeAccountParams:
    properties:
      password:
        type: string
    type: object
  server.CreateAccountParams:
    properties:
      email:
        type: string
      password:
        type: string
      role_id:
        $ref: '#/definitions/server.RoleID'
    type: object
  server.CreateCertificateAuthorityParams:
    properties:
      common_name:
        type: string
      country_name:
        type: string
      locality_name:
        type: string
      not_valid_after:
        type: string
      organization_name:
        type: string
      organizational_unit_name:
        type: string
      sans_dns:
        type: string
      self_signed:
        type: boolean
      state_or_province_name:
        type: string
    type: object
  server.CreateCertificateParams:
    properties:
      certificate:
        type: string
    type: object
  server.CreateCertificateRequestParams:
    properties:
      csr:
        type: string
    type: object
  server.CreateSuccessResponse:
    properties:
      id:
        type: integer
      message:
        type: string
    type: object
  server.GetAccountResponse:
    properties:
      auth_methods:
        items:
          type: string
        type: array
      email:
        type: string
      has_oidc:
        type: boolean
      has_password:
        type: boolean
      id:
        type: integer
      oidc_subject:
        type: string
      role_id:
        allOf:
        - $ref: '#/definitions/server.RoleID'
        description: Removed omitempty - role_id=0 (Admin) must be included
    type: object
  server.GetConfigContentResponse:
    properties:
      encryption_backend_type:
        type: string
      logging_level:
        type: string
      logging_output:
        type: string
      pebble_notifications:
        type: boolean
      port:
        type: integer
    type: object
  server.LoginParams:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  server.RoleID:
    enum:
    - 0
    - 1
    - 2
    - 3
    type: integer
    x-enum-varnames:
    - RoleAdmin
    - RoleCertificateManager
    - RoleCertificateRequestor
    - RoleReadOnly
  server.SignCertificateAuthorityParams:
    properties:
      certificate_authority_id:
        type: string
    type: object
  server.SignCertificateRequestParams:
    properties:
      certificate_authority_id:
        type: string
    type: object
  server.StatusResponse:
    properties:
      initialized:
        type: boolean
      oidc_enabled:
        type: boolean
      version:
        type: string
    type: object
  server.SuccessResponse:
    properties:
      message:
        type: string
    type: object
  server.UpdateCertificateAuthorityParams:
    properties:
      enabled:
        type: boolean
    type: object
  server.UploadCertificateToCertificateAuthorityParams:
    properties:
      certificate_chain:
        type: string
    type: object
info:
  contact: {}
  description: API for managing accounts, certificate requests, and certificate authorities.
  title: Notary API
  version: "1.0"
